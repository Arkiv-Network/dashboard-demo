name: Nightly E2E tests

on:
  schedule:
    # Every night at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test
        env:
          BASE_URL: https://eth-dashboard.demos.arkiv.network/showcase/

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 14

  notify:
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - name: Get previous run conclusion
        id: prev
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev_conclusion=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow "nightly-e2e.yml" \
            --status completed \
            --limit 1 \
            --json conclusion \
            --jq '.[0].conclusion // "none"')
          echo "conclusion=$prev_conclusion" >> "$GITHUB_OUTPUT"
          echo "Previous run conclusion: $prev_conclusion"

      - name: Notify Slack on state change
        if: |
          (needs.e2e.result == 'failure' && steps.prev.outputs.conclusion != 'failure') ||
          (needs.e2e.result == 'success' && steps.prev.outputs.conclusion == 'failure')
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CURRENT_STATUS: ${{ needs.e2e.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is not configured"
            exit 1
          fi

          if [ "$CURRENT_STATUS" = "failure" ]; then
            emoji="🔴"
            text="Dashboard E2E check *FAILED*"
            color="#dc3545"
          else
            emoji="🟢"
            text="Dashboard E2E check *RECOVERED*"
            color="#28a745"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d "{
              \"attachments\": [{
                \"color\": \"$color\",
                \"text\": \"$emoji $text\\n<$RUN_URL|View run>\",
                \"footer\": \"infura-demo\"
              }]
            }"
